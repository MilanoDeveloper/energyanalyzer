server:
  port: ${APP_PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
    username: ${DB_USER:RM560802}
    password: ${DB_PASS:300793}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ${FLYWAY_SCHEMAS:RM560802}
    default-schema: ${FLYWAY_SCHEMAS:RM560802}

app:
  security:
    user: ${BASIC_USER:admin}
    password: ${BASIC_PASSWORD:admin}